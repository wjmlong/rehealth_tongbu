<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BodyUP Admin{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-indigo-700 text-white px-6 py-3 flex items-center justify-between">
        <a href="/admin/" class="text-xl font-bold">BodyUP Admin</a>
        <div class="space-x-4 text-sm">
            <a href="/admin/" class="hover:underline">Dashboard</a>
            <a href="/admin/users" class="hover:underline">Users</a>
            <a href="/admin/llm" class="hover:underline">LLM Config</a>
            <a href="/admin/models" class="hover:underline">Models</a>
            <a href="/admin/logout" class="hover:underline text-indigo-200">Logout</a>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
