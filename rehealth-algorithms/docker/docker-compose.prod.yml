# PROD override: immutable image (no source mount), always-on, healthchecked,
# resource-capped. This is the "main runtime" the user wants isolated in WSL2.
services:
  pias:
    image: rehealth-pias:prod
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=info
    ports:
      - "8000:8000"
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
