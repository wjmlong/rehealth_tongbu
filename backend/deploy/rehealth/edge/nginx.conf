server {
    listen 8080;
    server_name _;
    client_max_body_size 8m;

    location /jeecg-boot/ {
        proxy_pass http://gateway:9999;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-ReHealth-User-Id "";
        proxy_set_header X-ReHealth-Tenant-Id "";
        proxy_set_header X-ReHealth-Device-Id "";
        proxy_set_header X-Internal-User-Id "";
        proxy_set_header X-Internal-Tenant-Id "";
        proxy_set_header X-Internal-Device-Id "";
        proxy_hide_header X-Internal-User-Id;
        proxy_hide_header X-Internal-Tenant-Id;
        proxy_hide_header X-Internal-Device-Id;
    }

    # JeecgBoot 前端默认 API 前缀是 /jeecgboot (无横杠)，后端 context-path 是 /jeecg-boot。
    # 上游 dev 代理会把 /jeecgboot 映射到 /jeecg-boot，这里在 edge 层补齐同样的映射。
    location /jeecgboot/ {
        proxy_pass http://gateway:9999/jeecg-boot/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-ReHealth-User-Id "";
        proxy_set_header X-ReHealth-Tenant-Id "";
        proxy_set_header X-ReHealth-Device-Id "";
        proxy_set_header X-Internal-User-Id "";
        proxy_set_header X-Internal-Tenant-Id "";
        proxy_set_header X-Internal-Device-Id "";
        proxy_hide_header X-Internal-User-Id;
        proxy_hide_header X-Internal-Tenant-Id;
        proxy_hide_header X-Internal-Device-Id;
    }

    location / {
        proxy_pass http://admin-web:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
