server:
  port: 8091

spring:
  application:
    name: rehealth-device-service
  kafka:
    bootstrap-servers: ${REHEALTH_KAFKA_BOOTSTRAP_SERVERS:}
    producer:
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        security.protocol: ${REHEALTH_KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
        sasl.mechanism: ${REHEALTH_KAFKA_SASL_MECHANISM:PLAIN}
        ssl.truststore.location: ${REHEALTH_KAFKA_SSL_TRUSTSTORE_LOCATION:}

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,requiredDependencies
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs

rehealth:
  hardware-db:
    enabled: ${REHEALTH_HARDWARE_DB_ENABLED:false}
    url: ${REHEALTH_HARDWARE_DB_URL:}
    username: ${REHEALTH_HARDWARE_DB_USERNAME:}
    password: ${REHEALTH_HARDWARE_DB_PASSWORD:}
    password-file: ${REHEALTH_HARDWARE_DB_PASSWORD_FILE:}
    retention:
      measurement-days: ${REHEALTH_MEASUREMENT_RETENTION_DAYS:730}
      signal-metadata-days: ${REHEALTH_SIGNAL_METADATA_RETENTION_DAYS:90}
      operational-days: ${REHEALTH_OPERATIONAL_RETENTION_DAYS:1095}
      published-outbox-days: ${REHEALTH_PUBLISHED_OUTBOX_RETENTION_DAYS:30}
  identity:
    enabled: ${REHEALTH_IDENTITY_ENABLED:false}
    base-url: ${REHEALTH_IDENTITY_BASE_URL:}
    readiness-url: ${REHEALTH_IDENTITY_READINESS_URL:}
    service-credential: ${REHEALTH_INTERNAL_SERVICE_CREDENTIAL:}
    service-credential-file: ${REHEALTH_INTERNAL_SERVICE_CREDENTIAL_FILE:}
  kafka:
    security:
      sasl-jaas-config-file: ${REHEALTH_KAFKA_SASL_JAAS_CONFIG_FILE:}
      ssl-truststore-password-file: ${REHEALTH_KAFKA_SSL_TRUSTSTORE_PASSWORD_FILE:}
    publisher:
      enabled: ${REHEALTH_KAFKA_PUBLISHER_ENABLED:false}
      batch-size: ${REHEALTH_KAFKA_PUBLISH_BATCH_SIZE:100}
      poll-interval: ${REHEALTH_KAFKA_POLL_INTERVAL:500ms}
      ack-timeout: ${REHEALTH_KAFKA_ACK_TIMEOUT:10s}
      initial-backoff: ${REHEALTH_KAFKA_INITIAL_BACKOFF:1s}
      maximum-backoff: ${REHEALTH_KAFKA_MAXIMUM_BACKOFF:5m}
      persisted-topic: rehealth.telemetry.persisted.v1
      quality-topic: rehealth.telemetry.quality.v1
